<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Link da favico-->
    <link rel="shortcut icon" href="../asets/imgs/logo/ipagest-icone.ico" type="image/x-icon">
    <!--Link da configuracao global css -->
    <link rel="stylesheet" href="../css/global-config.css">
    <!--Link da configuracao dos icones -->
    <link rel="stylesheet" href="../asets/webfonts/icones/boxicons.css">
    <!--Link da configuracao da fonte -->
    <link rel="stylesheet" href="../asets/webfonts/fonts/transfonter-open-sans/stylesheet.css">
    <!--Link da  avencas-painel.css-->
    <link rel="stylesheet" href="../css/avencas-painel.css">
    <link rel="stylesheet" href="../css/supervisao-ti.css">


    <title>Supervisao TI painel</title>
</head>

<body>
    <main>
        <dialog class="modal-eviar-email">
            <p>Email de confiramcao enviado para <strong>leonildobig27@gmail.com</strong> </p>
        </dialog>

        <dialog class="modal-cadastro-menbros-avencas">
            <h2>Adicionar Membro</h2>
            <form action="" class="enviar-email-form">
                <label for="user-nome-completo">
                    <span>Nome do usuario </span>
                    <input type="text" name="user-nome-completo" id="user-nome-completo"
                        placeholder=" Nome completo...">
                    <span class="alert" id="alert-nome"></span>
                </label>



                <label for="user-email">
                    <span>Email do usuario </span>
                    <input type="email" name="user-email" id="user-email" placeholder=" Email do usuario...">
                    <span class="alert" id="alert-email"></span>
                </label>

                <button type="submit" name="submit">Enviar </button>
            </form>
        </dialog>

        <dialog class="sair-da-conta">
            <i class="bx-bx-alert"></i>
            <p>Tem serteza que deseja sair da sua conta!</p>
            <div class="div-btns">
                <button class="sim-sair">Sim</button>
                <button class="nao-sair">Nao</button>
            </div>
        </dialog>


        <!--seccao da barra lateral-->
        <section class="side-bar">
            <ul class="ul-itens">


                <li class="li-estacionamento">
                    <span class="li-titulo-estacionamento">Arias de atividades</span>

                    <div class="i-rolo">
                        <i class="bx bx-clipboard-check"></i>
                        <span>Gestao de avencas</span>
                        <a href="../main/gerir-avencas.html"></a>
                    </div>
                </li>

                <li class="li-conta">
                    <span class="li-titulo-conta">Conta</span>
                    <div class="i-rolo" id="btn-usuario">
                        <i class="bx bx-user" id="icone-usuario"></i> <span class="usuario-nome"></span>
                        <i class="bx-chevron-right "></i>
                    </div>
                </li>
            </ul>
        </section>

        <!--seccao principal-->
        <section class="section-main">
            <article>
                <div class="div-header">
                    <img src="../asets/imgs/logo/ipagest-so-logo.svg" alt="app-logo" class="logo">
                    <p class="titulo-conta">Supervisao TI</p>
                    <div class="div-notificacoes">
                        <i class="bx-bell " id="btn-notificacoes"></i>
                        <div class="notificacoes hide">
                            <p>Ainda sem notificações!!!</p>
                            <img src="../asets/imgs/outros/wired-outline-139-basket-hover-pinch.gif" alt="">
                        </div>
                    </div>
                </div>

                <div class="div-lista">
                    <div class="div-lista-btns-toltal">
                        <span>Total de 300 usuarios</span>
                        <div class="btns-rolo">

                            <button class="adicionar"><i class="bx bx-plus"></i>
                                Adicionar
                            </button>
                        </div>
                    </div>

                    <ul class="lista">


                        <!--seccao principal-->



                    </ul>




                </div>


            </article>
        </section>
    </main>

    <script src="../js/supervisao-ti.js" type="module"></script>
</body>

</html>
