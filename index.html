<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Link da favico-->
    <link rel="shortcut icon" href="asets/imgs/logo/ipagest-icone.ico" type="image/x-icon">
    <!--Link da configuracao global css -->
    <link rel="stylesheet" href="css/global-config.css">
    <!--Link da configuracao dos icones -->
    <link rel="stylesheet" href="asets/webfonts/icones/boxicons.css">
    <!--Link da configuracao da fonte -->
    <link rel="stylesheet" href="asets/webfonts/fonts/transfonter-open-sans/stylesheet.css">
    <!--Link do index -->
    <link rel="stylesheet" href="css/index.css">

    <title>Ipagest</title>
</head>

<body>

    <!--modal com arias de atividade  -->
    <dialog>

        <article class="dialog-content">
            <img src="./asets/imgs/outros/circles.svg" alt="circles.svg">

            <!-- lista de  arias de atividade  -->
            <ul class="actividades">
                <a href="./main/login-avenças.html">
                    <li>

                        <span>Gestao de Avenças </span> <i class="bx-arrow-up-right-stroke"></i>
                    </li>
                </a>

                <a href="">
                    <li>Est. Long. Duracao <i class="bx-arrow-up-right-stroke"></i></li>
                    </li>
                </a>


            </ul>

        </article>
    </dialog>


    <!--conteudo principal do app index -->
    <main>
        <!--imagem svg do logo Ipagest  -->
        <img src="asets/imgs/logo/ipagest-logo.svg" alt="Ipagest-logo" class="upagest-logo" draggable="false">

        <!--Rotolo de artigos das contas -->
        <div class="div-contas">
            <!--Artigo gerencia-->
            <article class="gerencia">
                <img src="asets/imgs/outros/tv-alt.svg" alt="tv-alt.svg" draggable="false">

                <span class="titulo-gerencia">Gerência</span>
                <button class="gerencia"> Entrar</button>
            </article>
            <!--Artigo supervisao-->
            <article class="supervisao">
                <img src="asets/imgs/outros/joystick-alt-2.svg" alt="joystick-alt-2" draggable="false">

                <span class="titulo-supervisao">Supervisão TI</span>
                <button class="supervisao"> Entrar</button>
            </article>

            <!--Artigo atividades-->
            <article id="atividades">
                <img src="asets/imgs/outros/git-merge.svg" alt="merge.svg" draggable="false">

                <span class="titulo-atividades">Atividades</span>
                <button class="atividades"> Entrar</button>
            </article>

        </div>
    </main>
    <script src="./js/index.js"></script>
</body>

</html>
